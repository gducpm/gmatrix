name: Release

on:
  push:
    tags:
      - 'v*.*.*' # Trigger on any tag starting with 'v'

jobs:
  build_assets:
    name: Build & Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - uses: actions/checkout@v4

      - name: Dependencies (GNU/Linux)
        if: runner.os == 'Linux' # how misleading
        run: sudo apt update && sudo apt install -y libncurses5-dev libncursesw5-dev build-essential cmake

      - name: Dependencies (MacOS)
        if: runner.os == 'MacOS'
        run: brew install ncurses cmake

      - name: Dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install nsis -y
          vcpkg install pdcurses:x64-windows getopt-win32:x64-windows

      - name: Rename License for MacOS # why must you do that to me, Tim
        if: runner.os == 'MacOS'
        run: cp LICENSE LICENSE.txt

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run CPack
        run: |
          cd build
          cpack -C Release

      # --- Gather Artifacts ---
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gmatrix-binaries-${{ matrix.os }}
          path: |
            build/*.msi
            build/*.dmg
            build/*.pkg
            build/*.deb
            build/*.rpm
            build/*.tar.xz
            build/*.tar.gz
            build/*.tar.zst
            build/*.zip

  create_release:
    needs: build_assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: gmatrix-binaries-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/*.exe
            ./artifacts/*.dmg
            ./artifacts/*.deb
            ./artifacts/*.tar.xz
            ./artifacts/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
